<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calm Desire</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="game-body">
    <!-- Logout Button -->
    <button id="logoutBtn" class="logout-btn">Leave</button>

    <!-- Progress indicator -->
    <div class="progress-container">
        <span id="cardCounter">1</span> / 69
    </div>

    <!-- The Interactive Card -->
    <div class="card-container" id="cardContainer">
        <div class="glass-card" id="activeCard">
            <h2 class="card-number" id="cardNumberDisplay">Card #1</h2>
            <p class="card-quote" id="cardQuoteDisplay">
                [Placeholder Quote Text - Tap to reveal the next experience]
            </p>
            <p class="tap-hint">Tap anywhere to continue</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Check Auth before rendering
        if (!AuthSystem.isAuthenticated()) {
            window.location.href = 'index.html';
        }

        // Initialize Game
        GameSystem.init();

        // Handle Card Taps
        document.getElementById('cardContainer').addEventListener('click', function() {
            GameSystem.nextCard();
        });

        // Handle Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            AuthSystem.logout();
        });
    </script>
</body>
</html>
